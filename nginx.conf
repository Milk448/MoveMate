# Nginx configuration for the MoveMate Flutter web app.
# All routes are forwarded to index.html so Flutter's client-side router works.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Serve pre-compressed assets when available
    gzip_static on;

    location / {
        # Fall back to index.html for Flutter's hash / path router
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively; Flutter appends content hashes
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
